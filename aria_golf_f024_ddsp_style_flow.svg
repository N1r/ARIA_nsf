<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 760" role="img" aria-labelledby="aria-flow-title aria-flow-desc" preserveAspectRatio="xMidYMid meet" class="architecture-diagram">
  <title id="aria-flow-title">F024 ARIA-GOLF differentiable glottal source and vocal-tract flow</title>
  <desc id="aria-flow-desc">Left-to-right flow diagram for F024 ARIA-GOLF 16 kHz. F0 is pre-extracted and conditions both encoder and decoder phase.</desc>
  <defs>
    <style>
      text { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #111827; letter-spacing: 0; text-rendering: geometricPrecision; }
      .title { font-size: 27px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-size: 13.5px; font-weight: 500; fill: #334155; }
      .label { font-size: 16.5px; font-weight: 600; fill: #0f172a; }
      .small { font-size: 12.5px; font-weight: 500; fill: #334155; }
      .tiny { font-size: 10.8px; font-weight: 500; fill: #475569; }
      .box { stroke-width: 2; rx: 10; }
      .signal { fill: #f1f5f9; stroke: #52657a; }
      .neural { fill: #fff2ee; stroke: #9b5147; }
      .dsp { fill: #fbf1d8; stroke: #876c22; }
      .control { fill: #eaf5ed; stroke: #2f684d; }
      .observed { fill: #f1f5f9; stroke: #52657a; }
      .sum { fill: #fff2ee; stroke: #9b5147; }
      .loss { fill: #fff2ee; stroke: #9b5147; }
      .innerDsp { fill: #fffaf0; stroke: #9b7a25; stroke-width: 1.7; }
      .innerControl { fill: #f2fbf4; stroke: #3f7a5b; stroke-width: 1.5; }
      .stageLabel { font-size: 12.3px; font-weight: 600; fill: #0f172a; }
      .stageTiny { font-size: 10.2px; font-weight: 500; fill: #475569; }
      .ctrlNote { font-size: 10.2px; font-weight: 600; fill: #2f684d; }
      .orderCallout { fill: #fff8e5; stroke: #9b7a25; stroke-width: 1.6; }
      .orderText { font-size: 11.5px; font-weight: 600; fill: #5f4912; }
      .orderTiny { font-size: 9.6px; font-weight: 500; fill: #6b530f; }
      .arrow { stroke: #1f2937; stroke-width: 2.9; fill: none; marker-end: url(#aria-flow-arrowBlack); stroke-linecap: round; stroke-linejoin: round; }
      .arrowThin { stroke: #1f2937; stroke-width: 2.25; fill: none; marker-end: url(#aria-flow-arrowBlackSmall); stroke-linecap: round; stroke-linejoin: round; }
      .arrowCtrl { stroke: #2f684d; stroke-width: 2.35; fill: none; marker-end: url(#aria-flow-arrowGreen); stroke-linecap: round; stroke-linejoin: round; }
      .arrowLoss { stroke: #90443b; stroke-width: 2.8; fill: none; marker-end: url(#aria-flow-arrowRed); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 7 6; }
      .waveRaster { opacity: .96; }
      .glottalLine { stroke: #172033; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .glottalPulse { fill: #172033; opacity: .08; }
      .signalLine { stroke: #1f2937; stroke-width: 2.05; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .stageNote { font-size: 10.2px; font-weight: 500; fill: #6b530f; }
      .stageDivider { stroke: #ddc982; stroke-width: 1.2; opacity: .9; }
    </style>
    <marker id="aria-flow-arrowBlack" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4 L0,8 Z" fill="#111827"/></marker>
    <marker id="aria-flow-arrowBlackSmall" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#111827"/></marker>
    <marker id="aria-flow-arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#235c40"/></marker>
    <marker id="aria-flow-arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#90443b"/></marker>
  </defs>

  <rect width="1640" height="760" fill="#ffffff"/>
  <text x="820" y="38" class="title" text-anchor="middle">F024 ARIA-GOLF Source-Filter Autoencoder</text>
  <text x="820" y="63" class="subtitle" text-anchor="middle">BLCU F024 single-speaker Mandarin, 16 kHz | observed F0 and learned controls drive deterministic source-filter synthesis</text>

  <g id="observed-audio">
    <rect x="42" y="176" width="160" height="260" class="box signal" rx="10"/>
    <text x="122" y="232" class="label" text-anchor="middle">Observed</text>
    <text x="122" y="256" class="label" text-anchor="middle">Audio</text>
    <text x="122" y="281" class="small" text-anchor="middle">wav + .pv F0</text>
    <image class="waveRaster" x="56" y="312" width="132" height="82" href="data:image/png;base64,"/>
    <text x="122" y="404" class="tiny" text-anchor="middle">real F024 waveform</text>
  </g>

  <g id="encoder">
    <rect x="260" y="218" width="170" height="188" class="box neural" rx="10"/>
    <text x="345" y="284" class="label" text-anchor="middle">Encoder</text>
    <text x="345" y="309" class="small" text-anchor="middle">UNet + LSTM</text>
    <text x="345" y="337" class="tiny" text-anchor="middle">learned predictor</text>
    <text x="345" y="354" class="tiny" text-anchor="middle">STFT + log(1+F0)</text>
    <text x="345" y="382" class="tiny" text-anchor="middle">outputs controls</text>
  </g>
  <path class="arrow" d="M202 306 H258"/>
  <text x="230" y="294" class="tiny" text-anchor="middle">wav + F0</text>

  <g id="control-bus">
    <path class="arrowCtrl dash" d="M430 312 H456"/>
    <path d="M456 142 V472" stroke="#235c40" stroke-width="2.25" fill="none" stroke-dasharray="5 7"/>
  </g>

  <g id="controls">
    <rect x="500" y="108" width="150" height="68" class="box observed" rx="10"/>
    <text x="575" y="138" class="label" text-anchor="middle">F0 (.pv)</text>
    <text x="575" y="158" class="tiny" text-anchor="middle">observed, fixed</text>

    <rect x="500" y="218" width="150" height="68" class="box control" rx="10"/>
    <text x="575" y="248" class="label" text-anchor="middle">R_d</text>
    <text x="575" y="268" class="tiny" text-anchor="middle">learned control</text>

    <rect x="500" y="328" width="150" height="68" class="box control" rx="10"/>
    <text x="575" y="358" class="label" text-anchor="middle">Noise mag</text>
    <text x="575" y="378" class="tiny" text-anchor="middle">learned control</text>

    <rect x="500" y="438" width="150" height="78" class="box control" rx="10"/>
    <text x="575" y="468" class="label" text-anchor="middle">VT ctrl</text>
    <text x="575" y="489" class="tiny" text-anchor="middle">learned params</text>
    <text x="575" y="506" class="tiny" text-anchor="middle">n_learned = 8</text>
  </g>

  <path class="arrowCtrl dash" d="M202 240 L456 142 H498"/>
  <path class="arrowCtrl dash" d="M456 252 H498"/>
  <path class="arrowCtrl dash" d="M456 362 H498"/>
  <path class="arrowCtrl dash" d="M456 472 H498"/>

  <g id="lf-source">
    <rect x="700" y="126" width="220" height="138" class="box dsp" rx="10"/>
    <text x="810" y="170" class="label" text-anchor="middle">LF Glottal</text>
    <text x="810" y="194" class="label" text-anchor="middle">Source</text>
    <text x="810" y="219" class="small" text-anchor="middle">LF pulse train</text>
    <path class="glottalPulse" d="M716 260 C724 258 731 244 738 226 C744 244 750 260 758 260 Z M774 260 C782 258 789 244 796 226 C802 244 808 260 816 260 Z M832 260 C840 258 847 244 854 226 C860 244 866 260 874 260 Z"/>
    <path class="glottalLine" d="M716 260 C724 258 731 244 738 226 C742 238 746 252 758 260 C766 260 770 260 774 260 C782 258 789 244 796 226 C800 238 804 252 816 260 C824 260 828 260 832 260 C840 258 847 244 854 226 C858 238 862 252 874 260 C886 260 898 260 906 260"/>
  </g>
  <path class="arrowCtrl" d="M650 142 H698"/>
  <path class="arrowCtrl" d="M650 252 H698"/>

  <g id="noise-source">
    <rect x="700" y="346" width="160" height="110" class="box dsp" rx="10"/>
    <text x="780" y="386" class="label" text-anchor="middle">White</text>
    <text x="780" y="410" class="label" text-anchor="middle">Noise</text>
    <text x="780" y="435" class="tiny" text-anchor="middle">stochastic source</text>
    <path class="signalLine" d="M714 425 L720 410 L728 432 L736 414 L744 424 L752 407 L760 431 L768 416 L776 423 L784 409 L792 430 L800 405 L808 421 L816 413 L824 432 L832 411 L840 426 L848 418"/>
  </g>

  <g id="noise-filter">
    <rect x="920" y="346" width="180" height="110" class="box dsp" rx="10"/>
    <text x="1010" y="386" class="label" text-anchor="middle">Time-varying</text>
    <text x="1010" y="410" class="label" text-anchor="middle">FIR</text>
    <text x="1010" y="432" class="small" text-anchor="middle">deterministic filter</text>
    <path class="signalLine" d="M934 426 C948 405 966 404 982 419 C998 434 1014 430 1028 414 C1042 398 1058 408 1072 421 C1078 427 1083 429 1088 427"/>
  </g>
  <path class="arrowThin" d="M860 401 H918"/>
  <path class="arrowCtrl" d="M650 362 H888 V376 H918"/>

  <g id="sum">
    <circle cx="1160" cy="320" r="29" class="sum" stroke-width="2.6"/>
    <path d="M1148 320 H1172 M1160 308 V332" stroke="#90443b" stroke-width="4.8" stroke-linecap="round"/>
    <text x="1160" y="372" class="tiny" text-anchor="middle">source + shaped noise</text>
  </g>
  <path class="arrow" d="M920 195 H1120 V306 H1129"/>
  <path class="arrow" d="M1100 401 H1120 V334 H1131"/>
  <g id="lpc-order-callout">
    <rect x="1224" y="148" width="258" height="38" class="orderCallout" rx="9"/>
    <text x="1353" y="164" class="orderText" text-anchor="middle">8 learned biquads</text>
    <text x="1353" y="179" class="orderTiny" text-anchor="middle">LPC order = 2 x (3 + 8) = 22</text>
  </g>

  <g id="vocal-tract">
    <rect x="1224" y="210" width="258" height="198" class="box dsp" rx="12"/>
    <text x="1353" y="240" class="label" text-anchor="middle">Vocal-Tract Cascade</text>
    <text x="1353" y="262" class="small" text-anchor="middle">deterministic all-pole filtering</text>

    <line class="stageDivider" x1="1246" y1="278" x2="1460" y2="278"/>
    <rect x="1248" y="304" width="92" height="64" class="innerDsp" rx="8"/>
    <text x="1294" y="326" class="stageLabel" text-anchor="middle">All-pole 1</text>
    <text x="1294" y="346" class="stageTiny" text-anchor="middle">F1 / B1</text>

    <rect x="1366" y="304" width="92" height="64" class="innerDsp" rx="8"/>
    <text x="1412" y="326" class="stageLabel" text-anchor="middle">All-pole 2</text>
    <text x="1412" y="346" class="stageTiny" text-anchor="middle">F2 / B2</text>

    <path class="arrowThin" d="M1342 336 H1364"/>
    <text x="1353" y="392" class="stageNote" text-anchor="middle">coefficients set by learned VT params</text>
  </g>
  <path class="arrow" d="M1189 320 H1222"/>
  <path class="arrowCtrl" d="M650 477 H1198 V262 H1222"/>
  <text x="1148" y="252" class="ctrlNote" text-anchor="middle">learned F/B controls</text>
  <path class="arrow" d="M1482 320 H1498"/>

  <g id="synth-audio">
    <rect x="1500" y="220" width="120" height="230" class="box signal" rx="10"/>
    <text x="1560" y="272" class="label" text-anchor="middle">Synthesized</text>
    <text x="1560" y="296" class="label" text-anchor="middle">Audio</text>
    <image class="waveRaster" x="1505" y="312" width="110" height="82" href="data:image/png;base64,"/>
    <text x="1560" y="408" class="tiny" text-anchor="middle">model recon</text>
  </g>
  <g id="loss">
    <rect x="300" y="640" width="1000" height="72" class="box loss" rx="10"/>
    <text x="800" y="672" class="label" text-anchor="middle">Multi-Scale Spectrogram Loss</text>
    <text x="800" y="696" class="small" text-anchor="middle">MSSLoss, n_ffts = 255 / 511 / 1023, alpha = 1.0</text>
  </g>
  <path class="arrowLoss" d="M122 436 V676 H298"/>
  <path class="arrowLoss" d="M1560 450 V676 H1302"/>
</svg>
