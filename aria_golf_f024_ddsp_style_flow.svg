    <text x="575" y="468" class="label" text-anchor="middle">VT ctrl</text>
    <text x="575" y="489" class="tiny" text-anchor="middle">learned control</text>
    <text x="575" y="506" class="tiny" text-anchor="middle">F1/B1, F2/B2</text>
  </g>

