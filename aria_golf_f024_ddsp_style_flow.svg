<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 760" role="img" aria-labelledby="aria-flow-title aria-flow-desc" preserveAspectRatio="xMidYMid meet" class="architecture-diagram">
  <title id="aria-flow-title">F024 ARIA-GOLF differentiable glottal source and vocal-tract flow</title>
  <desc id="aria-flow-desc">Left-to-right flow diagram for F024 ARIA-GOLF 16 kHz. F0 is pre-extracted and conditions both encoder and decoder phase.</desc>
  <defs>
    <style>
      text { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; fill: #111827; letter-spacing: 0; text-rendering: geometricPrecision; }
      .title { font-size: 27px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-size: 13.5px; font-weight: 500; fill: #334155; }
      .label { font-size: 16.5px; font-weight: 600; fill: #0f172a; }
      .small { font-size: 12.5px; font-weight: 500; fill: #334155; }
      .tiny { font-size: 10.8px; font-weight: 500; fill: #475569; }
      .box { stroke-width: 2.25; rx: 10; }
      .signal { fill: #eef2f6; stroke: #405268; }
      .neural { fill: #fff0ec; stroke: #90443b; }
      .dsp { fill: #f8efd4; stroke: #7e641f; }
      .control { fill: #e8f3ea; stroke: #2f684d; }
      .observed { fill: #eef2f6; stroke: #405268; }
      .sum { fill: #fff0ec; stroke: #90443b; }
      .loss { fill: #fff0ec; stroke: #90443b; }
      .arrow { stroke: #111827; stroke-width: 3.25; fill: none; marker-end: url(#aria-flow-arrowBlack); stroke-linecap: round; stroke-linejoin: round; }
      .arrowThin { stroke: #111827; stroke-width: 2.55; fill: none; marker-end: url(#aria-flow-arrowBlackSmall); stroke-linecap: round; stroke-linejoin: round; }
      .arrowCtrl { stroke: #235c40; stroke-width: 2.55; fill: none; marker-end: url(#aria-flow-arrowGreen); stroke-linecap: round; stroke-linejoin: round; }
      .arrowLoss { stroke: #90443b; stroke-width: 2.8; fill: none; marker-end: url(#aria-flow-arrowRed); stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 7 6; }
      .waveFill { fill: #172033; opacity: .94; }
      .signalLine { stroke: #111827; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .response { stroke: #6b530f; stroke-width: 2.25; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .axis { stroke: #94a3b8; stroke-width: 1.15; opacity: .85; }
    </style>
    <marker id="aria-flow-arrowBlack" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4 L0,8 Z" fill="#111827"/></marker>
    <marker id="aria-flow-arrowBlackSmall" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#111827"/></marker>
    <marker id="aria-flow-arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#235c40"/></marker>
    <marker id="aria-flow-arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3.5 L0,7 Z" fill="#90443b"/></marker>
  </defs>

  <rect width="1640" height="760" fill="#ffffff"/>
  <text x="820" y="38" class="title" text-anchor="middle">F024 ARIA-GOLF Source-Filter Autoencoder</text>
  <text x="820" y="63" class="subtitle" text-anchor="middle">BLCU F024 single-speaker Mandarin, 16 kHz | observed F0 and learned controls drive deterministic source-filter synthesis</text>

